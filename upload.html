<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Hidden Gem</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/upload.css">
</head>
<body>

    <nav>
        <h2>NER Tour</h2>
        <a href="explore.html">Back to Explore</a>
    </nav>

    <main>
        <h1>Add Hidden Gem</h1>

        <form id="uploadForm">

            <input type="text" id="title" placeholder="Place name" required>

            <textarea id="description" placeholder="Describe the place"></textarea>

            <select id="category">
                <option value="waterfall">Waterfall</option>
                <option value="village">Village</option>
                <option value="trek">Trek</option>
                <option value="food">Food</option>
                <option value="culture">Culture</option>
            </select>

            <input type="file" id="image">

            <button type="button" id="getLocation">Capture Location</button>
            <p id="locationText"></p>

            <button type="submit">Upload</button>

        </form>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
