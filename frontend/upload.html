<body>

        </ul>
    </nav>

    <main>

        <h1>Add Hidden Gem</h1>

        <div class="upload-container">

            <form id="uploadForm">

                <input type="text" id="name" placeholder="Place name" required>

                <textarea id="description" placeholder="Describe the place"></textarea>

                <!-- <select id="state" required>
                    <option value="">Select State</option>
                    <option>Assam</option>
                    <option>Arunachal Pradesh</option>
                    <option>Meghalaya</option>
                    <option>Nagaland</option>
                    <option>Manipur</option>
                    <option>Mizoram</option>
                    <option>Tripura</option>
                    <option>Sikkim</option>
                </select>

                <input type="text" id="district" placeholder="District" required> -->



                <div class="row">
                    <select id="state" required>
                        <option value="">Select State</option>
                        <option>Assam</option>
                        <option>Arunachal Pradesh</option>
                        <option>Meghalaya</option>
                        <option>Nagaland</option>
                        <option>Manipur</option>
                        <option>Mizoram</option>
                        <option>Tripura</option>
                        <option>Sikkim</option>
                    </select>

                    <input type="text" id="district" placeholder="District" required>
                </div>


                <select id="category">
                    <option value="waterfall">Waterfall</option>
                    <option value="village">Village</option>
                    <option value="hill">Hill</option>
                    <option value="river">River</option>
                    <option value="forest">Forest</option>
                </select>

                <!-- <input type="file" id="image"> -->

                <div class="image-upload">

                    <div class="image-preview">
                        <img id="previewImage" src="" alt="Preview">
                        <span id="previewText">Image preview</span>
                    </div>

                    <input type="file" id="image">

                </div>

                <button type="submit">Upload</button>

            </form>


            <div class="map-section">
                <h3>Select location on map</h3>
                <div id="map"></div>
            </div>

        </div>

    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="js/upload.js"></script>
</body>

</html>
